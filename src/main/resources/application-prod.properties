# ═══════════════════════════════════════════════════════════════════
#  PRODUCTION profile
#  Activate: --spring.profiles.active=prod
#
#  IMPORTANT before deploying to production:
#    1. Replace H2 datasource with PostgreSQL / MySQL
#    2. Replace ddl-auto=create-drop with validate + Flyway/Liquibase
#    3. Store datasource credentials via environment variables or Vault
# ═══════════════════════════════════════════════════════════════════

#  No SQL logging — may expose sensitive bind parameters in log files
spring.jpa.show-sql=false

#  Enforce HTTPS-only session cookies
server.servlet.session.cookie.secure=true

#  Never expose internal error details to callers
server.error.include-message=never
server.error.include-binding-errors=never

#  Swagger / OpenAPI — disabled; no API contract exposed to the internet
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

#  Never seed test users in production
app.seed-test-users=false

#  Minimal logging — warnings and errors only
logging.level.com.dev.app=WARN
logging.level.org.apache.shiro=WARN
