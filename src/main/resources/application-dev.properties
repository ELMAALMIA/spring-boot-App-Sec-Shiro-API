# ═══════════════════════════════════════════════════════════════════
#  DEV profile — local development only.
#  Activate: --spring.profiles.active=dev  (or in IDE run config)
#  WARNING: These settings must NEVER reach a production environment.
# ═══════════════════════════════════════════════════════════════════

#  SQL logging for query inspection
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#  Allow non-HTTPS cookies on localhost
server.servlet.session.cookie.secure=false

#  Verbose error messages for debugging
server.error.include-message=always
server.error.include-binding-errors=always

#  Enable Swagger UI and OpenAPI docs
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

#  Enable H2 browser console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true

#  Seed test users on startup (admin/admin123, ayoub/ayoub123)
app.seed-test-users=true

#  Verbose logging
logging.level.com.dev.app=DEBUG
logging.level.org.apache.shiro=INFO
logging.level.org.hibernate.SQL=DEBUG
