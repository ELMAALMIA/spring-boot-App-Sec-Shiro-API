#  ─────────────────────────────────────────────────────────────────────────
#  Base configuration — production-safe defaults.
#  Per-environment overrides live in application-dev.properties (dev profile)
#  and application-prod.properties (prod profile).
#
#  Activate a profile:
#    CLI  → --spring.profiles.active=dev
#    IDE  → VM options → -Dspring.profiles.active=dev
#  ─────────────────────────────────────────────────────────────────────────

#  Database (H2 in-memory — demo only; replace with PostgreSQL/MySQL in production)
spring.datasource.url=jdbc:h2:mem:shiro_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#  JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

#  H2 console — disabled globally; dev profile enables on demand
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

#  Server
server.port=8080

#  Session cookie hardening
#    SameSite=Strict  — browser blocks cross-site request cookies (CSRF mitigation)
#    HttpOnly=true    — cookie inaccessible to JavaScript (XSS mitigation)
#    Secure=true      — cookie only sent over HTTPS; dev profile overrides to false
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

#  JSON serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

#  Error handling — never expose internals to callers; dev profile overrides
server.error.include-message=never
server.error.include-binding-errors=never

#  Logging — INFO level by default; dev profile overrides to DEBUG
logging.level.com.dev.app=INFO
logging.level.org.apache.shiro=WARN

#  Swagger / OpenAPI — disabled by default; dev profile enables
springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=false
springdoc.api-docs.path=/v3/api-docs

#  Seed test users — disabled by default; dev profile enables
app.seed-test-users=false

#  Account lockout — externalized for runtime tuning without recompile
app.security.max-failed-attempts=5
app.security.lock-duration-minutes=15
