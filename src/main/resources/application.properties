#  Database (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:shiro_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#  JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#  H2 Console — DEV ONLY, disabled by default.
#  Enable with: app.h2-console.enabled=true (never in production)
spring.h2.console.enabled=${app.h2-console.enabled:false}
spring.h2.console.path=/h2-console

#  Server
server.port=8080

#  Session cookie hardening
#    SameSite=Strict  — browser will not send cookie on cross-site requests (CSRF mitigation)
#    HttpOnly=true    — cookie inaccessible to JavaScript (XSS mitigation)
#    Secure=false     — set to true when TLS is enabled in production
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

#  JSON Serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

#  Error Handling
server.error.include-message=always
server.error.include-binding-errors=always

#  Logging
logging.level.com.dev.app=DEBUG
logging.level.org.apache.shiro=INFO

#  Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

#  Seed test users on startup — disable in production
app.seed-test-users=true

#  H2 console explicitly off unless overridden
app.h2-console.enabled=false
